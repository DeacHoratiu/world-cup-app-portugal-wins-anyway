name: World Cup notifications

on:
  schedule:
    # every 5 minutes (GitHub may delay runs by a few minutes at busy times)
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # allows manual runs from the Actions tab (useful for testing)

permissions:
  contents: write # needed to commit notifier/state.json back

concurrency:
  group: worldcup-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check scores and send ntfy alerts
        run: node notifier/notify.js
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

      - name: Save notification state
        run: |
          git config user.name "worldcup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add notifier/state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update notification state [skip ci]"
            git pull --rebase origin ${GITHUB_REF_NAME} || true
            git push
          fi

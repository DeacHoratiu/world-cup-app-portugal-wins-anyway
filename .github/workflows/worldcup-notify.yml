name: World Cup notifications

on:
  schedule:
    # starts a new ~55-minute polling shift; GitHub cron is unreliable,
    # so shifts overlap-queue via the concurrency group below
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # manual run = one single check (handy for testing)

permissions:
  contents: write # needed to commit notifier/state.json back

concurrency:
  group: worldcup-notify
  cancel-in-progress: false # new runs wait in line and take over when the current shift ends

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Poll scores and send ntfy alerts
        run: node notifier/notify.js
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # scheduled runs poll every 60s for ~55 min; manual runs do a single check
          LOOP_MINUTES: ${{ github.event_name == 'schedule' && '55' || '0' }}

      - name: Save notification state
        run: |
          git config user.name "worldcup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add notifier/state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update notification state [skip ci]"
            git pull --rebase origin ${GITHUB_REF_NAME} || true
            git push
          fi
